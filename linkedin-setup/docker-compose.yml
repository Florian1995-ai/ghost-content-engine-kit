services:
  linkedin-native:
    build:
      context: ..
      dockerfile: deploy/linkedin-native.Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

